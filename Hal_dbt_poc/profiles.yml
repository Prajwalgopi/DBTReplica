hal_dbt:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT', 'dummy') }}"
      user: "{{ env_var('SNOWFLAKE_USER', 'dummy') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD', 'dummy') }}"
      role: DBT_DEV_ROLE
      warehouse: DBT_WH
      database: COMMON_DB_DEV
      schema: PUBLIC
      threads: 4
