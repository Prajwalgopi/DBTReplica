name: 'hal_dbt_poc'
version: '1.0'
config-version: 2

profile: 'hal_dbt'

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

models:
  hal_dbt_poc:

    raw:
      +database: "{{ env_var('RAW_DB') }}"
      +schema: "{{ env_var('RAW_SCHEMA') }}"
      +materialized: table

    cleansed:
      +database: "{{ env_var('CLEANSED_DB') }}"
      +schema: "{{ env_var('CLEANSED_SCHEMA') }}"
      +materialized: table

    presentation:
      +database: "{{ env_var('MODEL_DB') }}"
      +schema: "{{ env_var('PRESENTATION_SCHEMA') }}"
      +materialized: table
