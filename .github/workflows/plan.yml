name: Plan dbt Changes

on:
  pull_request:
    branches:
      - '**'
    paths:
      - 'Hal_dbt_poc/models/**'
      - 'Hal_dbt_poc/seeds/**'
      - 'Hal_dbt_poc/dbt_project.yml'

jobs:
  plan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - run: pip install dbt-snowflake

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          hal_dbt:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: $SNOWFLAKE_ACCOUNT
                user: $SNOWFLAKE_USER
                password: $SNOWFLAKE_PASSWORD
                role: $SNOWFLAKE_ROLE
                warehouse: $SNOWFLAKE_WAREHOUSE
                database: DUMMY_DB
                schema: PUBLIC
                threads: 4
          EOF
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}

      - name: Run dbt Plan
        working-directory: Hal_dbt_poc
        run: |
          export RAW_DB=DWH_RAW_DEV
          export CLEANSED_DB=DWH_CLEANSED_DEV
          export MODEL_DB=DWH_MODEL_DEV

          export RAW_SCHEMA=RAW
          export CLEANSED_SCHEMA=CLEANSED
          export PRESENTATION_SCHEMA=PRESENTATION

          dbt debug
          dbt compile
          dbt test || true
