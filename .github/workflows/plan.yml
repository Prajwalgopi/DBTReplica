name: Plan dbt Changes

on:
  pull_request:
    branches:
      - '**'
    paths:
      - 'Hal_dbt_poc/models/**'
      - 'Hal_dbt_poc/macros/**'
      - 'Hal_dbt_poc/seeds/**'
      - 'Hal_dbt_poc/dbt_project.yml'

jobs:
  plan:
    runs-on: ubuntu-latest

    env:
      DBT_TARGET: dev
      RAW_DB: DWH_RAW_DEV
      CLEANSED_DB: DWH_CLEANSED_DEV
      MODEL_DB: DWH_MODEL_DEV

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dbt
        run: pip install dbt-snowflake

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          hal_dbt:
            target: $DBT_TARGET
            outputs:
              dev:
                type: snowflake
                account: $SNOWFLAKE_ACCOUNT
                user: $SNOWFLAKE_USER
                password: $SNOWFLAKE_PASSWORD
                role: $SNOWFLAKE_ROLE
                warehouse: $SNOWFLAKE_WAREHOUSE
                database: DUMMY_DB
                schema: PUBLIC
                threads: 4
          EOF
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}

      - name: Validate dbt Project
        working-directory: Hal_dbt_poc
        run: |
          dbt debug --target $DBT_TARGET
          dbt compile --target $DBT_TARGET
          dbt test --target $DBT_TARGET || true
