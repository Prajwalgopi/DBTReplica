name: HAL - Deploy DBT Project

on:
  push:
    branches:
      - main
    paths:
      - 'Hal_dbt_poc/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Debug Project Structure
        run: |
          echo "Listing Hal_dbt_poc contents"
          ls -R Hal_dbt_poc

      - name: Package DBT Project (Correct Root)
        run: |
          cd Hal_dbt_poc
          pwd
          ls
          zip -r ../dbt_project.zip .

      - name: Verify ZIP Structure
        run: |
          echo "ZIP CONTENTS:"
          unzip -l dbt_project.zip

      - name: Install Snowflake Connector
        run: pip install snowflake-connector-python

      - name: Deploy DBT Project
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          python <<EOF
          import snowflake.connector

          conn = snowflake.connector.connect(
              account="${SNOWFLAKE_ACCOUNT}",
              user="${SNOWFLAKE_USER}",
              password="${SNOWFLAKE_PASSWORD}",
              role="DBT_DEV_ROLE",
              warehouse="DBT_WH"
          )

          cs = conn.cursor()

          try:
              cs.execute("USE DATABASE COMMON_DB_DEV")
              cs.execute("USE SCHEMA DBT_PROJECTS")

              cs.execute("CREATE STAGE IF NOT EXISTS DBT_STAGE")

              cs.execute("PUT file://dbt_project.zip @DBT_STAGE AUTO_COMPRESS=FALSE OVERWRITE=TRUE")

              cs.execute("CREATE OR REPLACE DBT PROJECT DBTPOC FROM '@DBT_STAGE/dbt_project.zip'")

          finally:
              cs.close()
              conn.close()
          EOF
