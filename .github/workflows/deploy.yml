name: HAL - Deploy DBT Project

on:
  push:
    branches:
      - main
    paths:
      - 'Hal_dbt_poc/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Snowflake Connector
        run: pip install snowflake-connector-python

      - name: Deploy DBT Project
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          python <<EOF
          import snowflake.connector
          import os

          conn = snowflake.connector.connect(
              account="${SNOWFLAKE_ACCOUNT}",
              user="${SNOWFLAKE_USER}",
              password="${SNOWFLAKE_PASSWORD}",
              role="DBT_DEV_ROLE",
              warehouse="DBT_WH"
          )

          cs = conn.cursor()

          try:
              cs.execute("USE DATABASE COMMON_DB_DEV")
              cs.execute("USE SCHEMA DBT_PROJECTS")

              cs.execute("CREATE STAGE IF NOT EXISTS DBT_STAGE")
              cs.execute("REMOVE @DBT_STAGE")

              # Upload root file
              cs.execute("PUT file://Hal_dbt_poc/dbt_project.yml @DBT_STAGE OVERWRITE=TRUE")

              # Upload models recursively
              for root, dirs, files in os.walk("Hal_dbt_poc/models"):
                  for file in files:
                      local_path = os.path.join(root, file)
                      rel_path = os.path.relpath(root, "Hal_dbt_poc/models")
                      stage_path = "@DBT_STAGE/models/" + rel_path if rel_path != "." else "@DBT_STAGE/models"
                      cs.execute(f"PUT file://{local_path} {stage_path} OVERWRITE=TRUE")

              # Upload macros recursively
              for root, dirs, files in os.walk("Hal_dbt_poc/macros"):
                  for file in files:
                      local_path = os.path.join(root, file)
                      rel_path = os.path.relpath(root, "Hal_dbt_poc/macros")
                      stage_path = "@DBT_STAGE/macros/" + rel_path if rel_path != "." else "@DBT_STAGE/macros"
                      cs.execute(f"PUT file://{local_path} {stage_path} OVERWRITE=TRUE")

              # Create DBT project
              cs.execute("""
              CREATE OR REPLACE DBT PROJECT DBTPOC
              FROM '@DBT_STAGE'
              """)

          finally:
              cs.close()
              conn.close()
          EOF
