name: Deploy dbt to Snowflake

on:
  push:
    branches:
      - main
    paths:
      - 'Hal_dbt_poc/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dbt
        run: pip install dbt-snowflake

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          hal_dbt:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: $SNOWFLAKE_ACCOUNT
                user: $SNOWFLAKE_USER
                password: $SNOWFLAKE_PASSWORD
                role: DBT_DEV_ROLE
                warehouse: $SNOWFLAKE_WAREHOUSE
                database: DEV_RAW_DB
                schema: ""
                threads: 4
          EOF
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}

      - name: Set dbt env vars
        run: |
          echo "RAW_DB=DEV_RAW_DB" >> $GITHUB_ENV
          echo "CLEANSED_DB=DEV_CLEANSED_DB" >> $GITHUB_ENV
          echo "MODEL_DB=DEV_MODEL_DB" >> $GITHUB_ENV
          echo "RAW_SCHEMA=RAW" >> $GITHUB_ENV
          echo "CLEANSED_SCHEMA=CLEANSED" >> $GITHUB_ENV
          echo "PRESENTATION_SCHEMA=PRESENTATION" >> $GITHUB_ENV

      - name: Install dependencies
        working-directory: Hal_dbt_poc
        run: dbt deps

      - name: Deploy dbt models
        working-directory: Hal_dbt_poc
        run: dbt build
