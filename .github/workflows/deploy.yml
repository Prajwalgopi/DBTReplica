name: HAL - Deploy DBT Project

on:
  push:
    branches:
      - main
    paths:
      - 'Hal_dbt_poc/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Install Snowflake Connector
        run: pip install snowflake-connector-python

      - name: Deploy with Versioning
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          python <<EOF
          import snowflake.connector

          conn = snowflake.connector.connect(
              account="${SNOWFLAKE_ACCOUNT}",
              user="${SNOWFLAKE_USER}",
              password="${SNOWFLAKE_PASSWORD}",
              role="DBT_DEV_ROLE",
              warehouse="DBT_WH"
          )

          cs = conn.cursor()

          try:
              cs.execute("USE DATABASE COMMON_DB_DEV")
              cs.execute("USE SCHEMA DBT_PROJECTS")

              # Step 1: Create new version
              cs.execute("ALTER DBT PROJECT DBTPOC ADD VERSION")

              # Step 2: Get latest version name
              cs.execute("DESCRIBE DBT PROJECT DBTPOC")
              rows = cs.fetchall()

              version_name = None
              for row in rows:
                  if row[0] == 'default_version_name':
                      version_name = row[1]

              # Step 3: Deploy to that version
              cs.execute(f"""
              CREATE OR REPLACE DBT PROJECT DBTPOC
              FROM '@HAL_REPO/branches/main/Hal_dbt_poc'
              """)

          finally:
              cs.close()
              conn.close()
          EOF
